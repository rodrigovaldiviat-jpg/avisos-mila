<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Mila FM 88.7 — Panel Estudio</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #fafaf8;
    --border: #e8e6e0;
    --text: #1a1a1a;
    --muted: #888;
    --muted2: #bbb;
    --pink:   #e91e8c;
    --orange: #ff6d00;
    --yellow: #c8b800;
    --green:  #6abf00;
    --sky:    #29b6e8;
    --red:    #e8002d;
    --amber:  #ff8f00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito Sans', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* TOPBAR */
  .topbar {
    display: flex; align-items: center;
    padding: 0 20px; height: 58px;
    background: var(--surface);
    border-bottom: 4px solid transparent;
    border-image: linear-gradient(90deg, #e91e8c, #ff6d00, #c8b800, #6abf00, #29b6e8) 1;
    flex-shrink: 0; gap: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .logo-svg { height: 40px; width: 40px; flex-shrink: 0; }
  .station { font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 900; color: var(--text); line-height: 1.2; }
  .station .fm { font-size: 11px; color: var(--muted); font-weight: 600; display: block; }
  .on-air {
    display: flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, var(--pink), var(--orange));
    color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 10px; font-weight: 900; letter-spacing: 2px;
    padding: 5px 12px; border-radius: 20px;
  }
  .dot { width: 6px; height: 6px; background: #fff; border-radius: 50%; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* CLIMA + SANTO */
  .info-extra {
    display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
  }
  .clima-pill {
    display: flex; align-items: center; gap: 5px;
    background: #e8f6ff; border: 1px solid #b8e0f8;
    border-radius: 12px; padding: 3px 10px;
  }
  .clima-icon { font-size: 14px; }
  .clima-temp { font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 900; color: #1a6abf; }
  .clima-desc { font-size: 10px; color: #4a8abf; font-weight: 600; }

  .santo-pill {
    display: flex; align-items: center; gap: 4px;
    font-size: 10px; color: var(--muted); font-weight: 600;
  }
  .santo-pill span { color: var(--orange); font-weight: 800; }

  /* RELOJ */
  .reloj-bloque {
    display: flex; align-items: flex-end; gap: 8px; margin-left: auto;
  }
  .clock {
    font-family: 'Nunito', sans-serif;
    font-size: 26px; font-weight: 900; font-variant-numeric: tabular-nums;
    color: var(--orange); letter-spacing: 2px;
  }
  .fecha { font-size: 10px; color: var(--muted); text-align: right; line-height: 1.4; font-weight: 600; }

  /* PROGRAMA BAR */
  .programa-bar {
    background: var(--surface2); border-bottom: 1px solid var(--border);
    padding: 8px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .prog-pill {
    display: flex; align-items: center; gap: 8px;
    background: #fff5f0; border: 1.5px solid #ffd0b0;
    border-radius: 20px; padding: 4px 14px 4px 8px;
  }
  .prog-dot { width: 8px; height: 8px; border-radius: 50%; background: linear-gradient(135deg, var(--pink), var(--orange)); flex-shrink: 0; }
  .prog-label { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .prog-nombre { font-size: 14px; font-weight: 900; color: var(--orange); font-family: 'Nunito', sans-serif; }
  .prog-horario { font-size: 11px; color: var(--muted); font-weight: 600; }
  .avisos-pendientes { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); font-weight: 600; }
  .badge-count {
    background: linear-gradient(135deg, var(--sky), #1a8fbf); color: #fff;
    font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 900;
    padding: 2px 10px; border-radius: 12px; min-width: 28px; text-align: center;
  }
  .badge-count.urgente { background: linear-gradient(135deg, var(--red), #b00020); }

  /* COLUMNAS */
  .columnas { flex: 1; display: flex; overflow: hidden; }
  .columna-programa { flex: 3; display: flex; flex-direction: column; overflow: hidden; border-right: 2px solid var(--border); }
  .columna-radio { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--surface2); }

  .col-header {
    padding: 10px 16px 8px; background: var(--surface);
    border-bottom: 3px solid var(--border);
    flex-shrink: 0; display: flex; align-items: center; gap: 8px;
  }
  .col-header.programa { border-bottom-color: var(--orange); }
  .col-header.radio    { border-bottom-color: var(--sky); }
  .col-titulo { font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
  .col-header.programa .col-titulo { color: var(--orange); }
  .col-header.radio    .col-titulo { color: var(--sky); }
  .col-badge { font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 900; padding: 1px 7px; border-radius: 10px; color: #fff; }
  .col-header.programa .col-badge { background: var(--orange); }
  .col-header.radio    .col-badge { background: var(--sky); }

  .lista-programa {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 10px; background: var(--bg);
  }
  .lista-programa::-webkit-scrollbar { width: 4px; }
  .lista-programa::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .lista-radio {
    flex: 1; overflow-y: auto; padding: 8px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .lista-radio::-webkit-scrollbar { width: 3px; }
  .lista-radio::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* CARDS PROGRAMA */
  .aviso-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 16px 18px;
    display: flex; gap: 12px; align-items: flex-start;
    position: relative; overflow: hidden;
    transition: box-shadow 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .aviso-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 5px; background: var(--border); border-radius: 14px 0 0 14px;
  }
  .aviso-card.urgente::before { background: linear-gradient(180deg, var(--red), #ff6b6b); }
  .aviso-card.ahora::before   { background: linear-gradient(180deg, var(--green), #a8e063); }
  .aviso-card.alerta::before  { background: linear-gradient(180deg, var(--amber), var(--yellow)); }
  .aviso-card.urgente { border-color: #ffcdd2; background: #fff8f8; animation: flashUrgente 2s infinite; }
  @keyframes flashUrgente { 0%,100%{box-shadow:0 1px 4px rgba(0,0,0,0.04)} 50%{box-shadow:0 0 0 4px rgba(232,0,45,0.18)} }
  .aviso-card.ahora { border-color: #c8f0a0; background: #f4fff0; }
  .aviso-card.alerta { border-color: #ffd090; background: #fffaf0; animation: flashAlerta 1.2s infinite; }
  @keyframes flashAlerta { 0%,100%{box-shadow:0 1px 4px rgba(0,0,0,0.04)} 50%{box-shadow:0 0 0 5px rgba(255,143,0,0.22)} }

  .aviso-icono { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
  .aviso-cuerpo { flex: 1; min-width: 0; }
  .aviso-top { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .aviso-marca { font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 900; color: var(--text); }
  .aviso-horario {
    font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 900;
    color: var(--orange); margin-left: auto; display: flex; align-items: center; gap: 4px;
  }
  .aviso-horario.pronto { color: var(--amber); }
  .aviso-horario.ya     { color: var(--green); }
  .cuenta-regresiva { font-size: 12px; font-weight: 900; color: var(--amber); }
  .aviso-texto { font-size: 16px; line-height: 1.65; color: #333; font-weight: 600; margin-top: 4px; }
  .aviso-meta { font-size: 12px; color: var(--muted); margin-top: 6px; display: flex; gap: 8px; flex-wrap: wrap; }

  .tag {
    font-size: 9px; font-weight: 800; letter-spacing: 0.8px;
    padding: 2px 8px; border-radius: 20px; text-transform: uppercase; white-space: nowrap;
  }
  .tag-ahora      { background: #e8f8d8; color: #3a8000; border: 1px solid #b0e080; }
  .tag-urgente    { background: #ffe8e8; color: #c0001a; border: 1px solid #ffb0b8; }
  .tag-alerta     { background: #fff4e0; color: #b06000; border: 1px solid #ffd898; }
  .tag-tipo       { background: #e8f4ff; color: #1a6abf; border: 1px solid #b8d8f8; }

  /* ITEMS RADIO */
  .radio-item {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 9px 12px;
    cursor: pointer; position: relative; overflow: hidden;
    transition: box-shadow 0.15s, border-color 0.15s;
    display: flex; align-items: center; gap: 8px;
  }
  .radio-item::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px; background: var(--sky); border-radius: 10px 0 0 10px;
  }
  .radio-item.urgente::before { background: var(--red); }
  .radio-item.alerta::before  { background: var(--amber); }
  .radio-item.ahora::before   { background: var(--green); }
  .radio-item.urgente { border-color: #ffcdd2; background: #fff8f8; animation: flashUrgente 2s infinite; }
  .radio-item.alerta  { border-color: #ffd090; background: #fffaf0; animation: flashAlerta 1.2s infinite; }
  .radio-item.ahora   { border-color: #c8f0a0; background: #f4fff0; }
  .radio-item:hover   { box-shadow: 0 3px 12px rgba(0,0,0,0.1); border-color: var(--sky); }
  .radio-item-marca { font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 900; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .radio-item-hora { font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 800; color: var(--orange); white-space: nowrap; flex-shrink: 0; }
  .radio-item-hora.pronto { color: var(--amber); }
  .radio-item-hora.ya     { color: var(--green); }
  .radio-item-cr  { font-size: 10px; font-weight: 900; color: var(--amber); flex-shrink: 0; }
  .radio-item-arr { font-size: 10px; color: var(--muted2); flex-shrink: 0; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 1000;
    align-items: center; justify-content: center; padding: 30px;
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: var(--surface); border-radius: 20px; padding: 32px 36px;
    max-width: 680px; width: 100%; max-height: 80vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25); position: relative;
    border-top: 5px solid var(--sky);
  }
  .modal.urgente { border-top-color: var(--red); }
  .modal.alerta  { border-top-color: var(--amber); }
  .modal-cerrar {
    position: absolute; top: 16px; right: 20px;
    font-size: 22px; cursor: pointer; color: var(--muted);
    background: none; border: none; line-height: 1; transition: color 0.15s;
  }
  .modal-cerrar:hover { color: var(--text); }
  .modal-marca { font-family: 'Nunito', sans-serif; font-size: 26px; font-weight: 900; color: var(--text); margin-bottom: 6px; }
  .modal-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .modal-hora { font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 900; color: var(--orange); }
  .modal-hora.pronto { color: var(--amber); }
  .modal-hora.ya     { color: var(--green); }
  .modal-cr { font-size: 14px; font-weight: 900; color: var(--amber); }
  .modal-copy { font-size: 19px; line-height: 1.75; color: #222; font-weight: 600; white-space: pre-wrap; }
  .modal-footer { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; }
  .modal-btn-cerrar {
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800;
    background: var(--sky); color: #fff; border: none;
    padding: 10px 28px; border-radius: 20px; cursor: pointer; transition: opacity 0.15s;
  }
  .modal-btn-cerrar:hover { opacity: 0.85; }

  /* VACÍO */
  .estado-vacio {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--muted); gap: 8px; padding: 30px 12px; text-align: center;
  }
  .estado-vacio span { font-size: 28px; }
  .estado-vacio p { font-size: 11px; line-height: 1.6; max-width: 160px; font-weight: 600; }

  /* FOOTER */
  .footer {
    height: 32px; background: var(--surface); border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 8px; flex-shrink: 0;
  }
  .footer-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  .footer-dot.sin-conexion { background: var(--muted2); }
  .footer-text   { font-size: 11px; color: var(--muted); font-weight: 600; }
  .footer-update { margin-left: auto; font-size: 11px; color: var(--muted2); }
</style>
</head>

function getSantoHoy() {
  const hoy = new Date();
  const key = `${hoy.getMonth()+1}-${hoy.getDate()}`;
  return SANTOS[key] || '—';
}

// ÍCONOS CLIMA
function getClimaIcono(codigo) {
  if (codigo <= 1) return '☀️';
  if (codigo <= 3) return '⛅';
  if (codigo <= 48) return '🌫️';
  if (codigo <= 67) return '🌧️';
  if (codigo <= 77) return '❄️';
  if (codigo <= 82) return '🌦️';
  if (codigo <= 99) return '⛈️';
  return '🌤️';
}

// CARGAR CLIMA (Open-Meteo, gratis, sin API key)
// Coordenadas Limache: -33.0, -71.09
async function cargarClima() {
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=-33.0&longitude=-71.09&current=temperature_2m,weathercode&timezone=America%2FSantiago';
    const res = await fetch(url);
    const data = await res.json();
    const temp = Math.round(data.current.temperature_2m);
    const codigo = data.current.weathercode;
    document.getElementById('climaTemp').textContent = `${temp}°C`;
    document.getElementById('climaIcon').textContent = getClimaIcono(codigo);
    document.getElementById('climaDesc').textContent = 'Limache';
  } catch(e) {
    document.getElementById('climaTemp').textContent = '--°C';
    document.getElementById('climaDesc').textContent = 'Sin datos';
  }
}

// HELPERS
function horaEnMinutos(str) {
  if (!str) return null;
  const p = String(str).split(':').map(Number);
  if (p.length < 2 || isNaN(p[0]) || isNaN(p[1])) return null;
  return p[0] * 60 + p[1];
}
function minutosActuales() { const a = new Date(); return a.getHours() * 60 + a.getMinutes(); }
function getProgramaActual() {
  const min = minutosActuales();
  return PROGRAMAS.find(p => {
    const ini = horaEnMinutos(p.inicio);
    let fin = horaEnMinutos(p.fin);
    if (ini === null || fin === null) return false;
    if (fin === 0) fin = 1440;
    return min >= ini && min < fin;
  }) || null;
}
function actualizarProgramaActual() {
  const prog = getProgramaActual();
  document.getElementById('programaNombre').textContent = prog ? prog.nombre : 'Sin programa activo';
  document.getElementById('programaHorario').textContent = prog ? `${prog.inicio} – ${prog.fin}` : '';
}
function esUrgente(a) { return a.urgente === true || a.urgente === 'true' || a.urgente === 1; }
function getEstadoAviso(a) {
  if (esUrgente(a)) return 'urgente';
  if (!a.hora) return 'normal';
  const min = horaEnMinutos(a.hora);
  if (min === null) return 'normal';
  const diff = min - minutosActuales();
  if (diff >= 0 && diff <= 5) return 'alerta';
  if (diff < 0 && diff >= -10) return 'ahora';
  return 'normal';
}
function getHorarioTexto(a) {
  if (a.hora) return '⏰ ' + a.hora;
  if (a.bloque) return '📦 ' + a.bloque;
  if (a.frecuencia) return '🔁 ' + a.frecuencia;
  return '';
}
function getTipoTag(a) {
  const map = { horario_fijo:'⏰ Horario fijo', bloque:'📦 Bloque', mencion:'🔁 Frecuencia' };
  return map[a.tipo] || a.tipo || '';
}
function getCuentaRegresiva(a) {
  if (!a.hora) return '';
  const min = horaEnMinutos(a.hora);
  if (min === null) return '';
  const diff = min - minutosActuales();
  if (diff === 0) return '⚡ ¡YA!';
  if (diff > 0 && diff <= 5) return `⚡ ${diff} min`;
  return '';
}

// CARD PROGRAMA
function mkCardPrograma(a) {
  const estado = getEstadoAviso(a);
  const card = document.createElement('div');
  card.dataset.id = String(a.id);
  card.className = 'aviso-card ' + estado;
  const iconos = { urgente:'🔴', alerta:'⚠️', ahora:'📍', normal:'📢' };
  const cr = getCuentaRegresiva(a);
  const horClass = estado==='alerta'?'pronto':estado==='ahora'?'ya':'';
  card.innerHTML = `
    <div class="aviso-icono">${iconos[estado]||'📢'}</div>
    <div class="aviso-cuerpo">
      <div class="aviso-top">
        <span class="aviso-marca">${a.marca||'Sin marca'}</span>
        ${esUrgente(a)?'<span class="tag tag-urgente">⚡ URGENTE</span>':''}
        ${estado==='ahora'&&!esUrgente(a)?'<span class="tag tag-ahora">📍 Ahora</span>':''}
        ${estado==='alerta'?'<span class="tag tag-alerta">⚠️ Pronto</span>':''}
        <span class="aviso-horario ${horClass}">${getHorarioTexto(a)}${cr?` <span class="cuenta-regresiva">${cr}</span>`:''}</span>
      </div>
      <div class="aviso-texto">${a.copy||'Sin texto'}</div>
      <div class="aviso-meta"><span class="tag tag-tipo">${getTipoTag(a)}</span></div>
    </div>`;
  return card;
}

// ITEM RADIO
function mkItemRadio(a) {
  const estado = getEstadoAviso(a);
  const item = document.createElement('div');
  item.dataset.id = String(a.id);
  item.className = 'radio-item ' + estado;
  const cr = getCuentaRegresiva(a);
  const horClass = estado==='alerta'?'pronto':estado==='ahora'?'ya':'';
  const horTexto = getHorarioTexto(a);
  item.innerHTML = `
    <span class="radio-item-marca">${a.marca||'Sin marca'}</span>
    ${cr?`<span class="radio-item-cr">${cr}</span>`:''}
    ${horTexto?`<span class="radio-item-hora ${horClass}">${horTexto}</span>`:''}
    <span class="radio-item-arr">▶</span>`;
  item.addEventListener('click', () => abrirModal(a));
  return item;
}

// MODAL
function abrirModal(a) {
  modalAvisoActivo = a;
  const estado = getEstadoAviso(a);
  const modal = document.getElementById('modal');
  modal.className = 'modal ' + (estado !== 'normal' ? estado : '');
  document.getElementById('modalMarca').textContent = a.marca || 'Sin marca';
  document.getElementById('modalCopy').textContent = a.copy || 'Sin texto';
  const horTexto = getHorarioTexto(a);
  const horEl = document.getElementById('modalHora');
  horEl.textContent = horTexto;
  horEl.className = 'modal-hora' + (estado==='alerta'?' pronto':estado==='ahora'?' ya':'');
  actualizarModal(a);
  const tag = document.getElementById('modalTag');
  tag.textContent = getTipoTag(a);
  tag.className = 'tag tag-tipo';
  document.getElementById('modalOverlay').classList.add('visible');
}
function actualizarModal(a) {
  document.getElementById('modalCr').textContent = getCuentaRegresiva(a);
}
function cerrarModal() {
  document.getElementById('modalOverlay').classList.remove('visible');
  modalAvisoActivo = null;
}
document.getElementById('modalCerrar').addEventListener('click', cerrarModal);
document.getElementById('modalBtnCerrar').addEventListener('click', cerrarModal);
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) cerrarModal();
});
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') cerrarModal(); });

// ACTUALIZAR ESTADOS
function actualizarEstados() {
  document.querySelectorAll('.aviso-card[data-id]').forEach(card => {
    const a = avisos.find(x => String(x.id) === card.dataset.id);
    if (!a) return;
    const estado = getEstadoAviso(a);
    card.className = 'aviso-card ' + estado;
    const crEl = card.querySelector('.cuenta-regresiva');
    if (crEl) crEl.textContent = getCuentaRegresiva(a);
    ['tag-ahora','tag-alerta'].forEach(cls => { const t=card.querySelector('.'+cls); if(t) t.remove(); });
    const top = card.querySelector('.aviso-top');
    const horEl = card.querySelector('.aviso-horario');
    if (estado==='ahora'&&!esUrgente(a)) { const t=document.createElement('span'); t.className='tag tag-ahora'; t.textContent='📍 Ahora'; top.insertBefore(t,horEl); }
    if (estado==='alerta') { const t=document.createElement('span'); t.className='tag tag-alerta'; t.textContent='⚠️ Pronto'; top.insertBefore(t,horEl); }
  });
  document.querySelectorAll('.radio-item[data-id]').forEach(item => {
    const a = avisos.find(x => String(x.id) === item.dataset.id);
    if (!a) return;
    const estado = getEstadoAviso(a);
    item.className = 'radio-item ' + estado;
    const crEl = item.querySelector('.radio-item-cr');
    if (crEl) crEl.textContent = getCuentaRegresiva(a);
  });
}

// ORDENAR
function ordenar(lista) {
  return lista.sort((a,b) => {
    if (esUrgente(a)&&!esUrgente(b)) return -1;
    if (!esUrgente(a)&&esUrgente(b)) return 1;
    return (horaEnMinutos(a.hora)??9999)-(horaEnMinutos(b.hora)??9999);
  });
}

// RENDER
function renderListas() {
  const prog = getProgramaActual();
  const progNombre = prog ? prog.nombre : null;
  const avisosPrograma = progNombre ? avisos.filter(a => a.programa === progNombre) : [];
  const avisosRadio    = avisos.filter(a => a.programa === MENCIONES_RADIO_KEY);

  const lp = document.getElementById('listaPrograma');
  lp.innerHTML = '';
  if (avisosPrograma.length === 0) {
    lp.innerHTML = `<div class="estado-vacio"><span>📭</span><p>${progNombre?'Sin avisos para este programa':'Sin programa activo ahora'}</p></div>`;
  } else {
    ordenar([...avisosPrograma]).forEach(a => lp.appendChild(mkCardPrograma(a)));
  }

  const lr = document.getElementById('listaRadio');
  lr.innerHTML = '';
  if (avisosRadio.length === 0) {
    lr.innerHTML = `<div class="estado-vacio"><span>📭</span><p>Sin menciones radio</p></div>`;
  } else {
    ordenar([...avisosRadio]).forEach(a => lr.appendChild(mkItemRadio(a)));
  }

  document.getElementById('badgePrograma').textContent = avisosPrograma.length;
  document.getElementById('badgeRadio').textContent    = avisosRadio.length;
  const total    = avisosPrograma.length + avisosRadio.length;
  const urgentes = avisos.filter(a => esUrgente(a)).length;
  const badge    = document.getElementById('contadorBadge');
  badge.textContent = total;
  badge.className   = 'badge-count' + (urgentes > 0 ? ' urgente' : '');
  actualizarEstados();
}

// CARGAR AVISOS
async function cargarAvisos() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    avisos = Array.isArray(data) ? data : (data.avisos || []);
    if (!Array.isArray(data) && data.programas && data.programas.length > 0) PROGRAMAS = data.programas;
    renderListas();
    document.getElementById('footerDot').className = 'footer-dot';
    document.getElementById('footerText').textContent = 'En línea · Radio Mila FM 88.7';
    document.getElementById('footerUpdate').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-CL');
  } catch(e) {
    document.getElementById('footerDot').className = 'footer-dot sin-conexion';
    document.getElementById('footerText').textContent = 'Sin conexión · ' + e.message;
    ['listaPrograma','listaRadio'].forEach(id => {
      document.getElementById(id).innerHTML = `<div class="estado-vacio"><span>⚠️</span><p>Error de conexión</p></div>`;
    });
  }
}
