<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Mila FM 88.7 — Panel Estudio</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #666;
    --amber: #ffab00;
    --red: #e8002d;
    --green: #00c853;
    --pink: #e91e8c;
    --blue: #2979ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── TOPBAR ── */
  .topbar {
    display: flex;
    align-items: center;
    padding: 0 20px;
    height: 56px;
    background: var(--surface);
    border-bottom: 3px solid transparent; border-image: linear-gradient(90deg, #e91e8c, #ff6d00, #ffd600, #00c853, #00b0ff) 1;
    flex-shrink: 0;
    gap: 14px;
  }
  .logo { height: 36px; border-radius: 6px; }
  .station { font-size: 18px; font-weight: 800; letter-spacing: 2px; color: var(--text); }
  .station span { color: var(--red); }
  .on-air {
    display: flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, #e91e8c, #ff6d00); color: #fff;
    font-size: 11px; font-weight: 800; letter-spacing: 2px;
    padding: 4px 12px; border-radius: 4px;
  }
  .dot { width: 7px; height: 7px; background: #fff; border-radius: 50%; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .clock {
    margin-left: auto;
    font-size: 22px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    color: #ff6d00;
    letter-spacing: 2px;
  }
  .fecha {
    font-size: 11px;
    color: var(--muted);
    margin-left: 4px;
    text-align: right;
    line-height: 1.3;
  }

  /* ── PROGRAMA ACTUAL ── */
  .programa-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .programa-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .programa-nombre {
    font-size: 14px; font-weight: 700; color: #ff6d00;
  }
  .programa-horario { font-size: 12px; color: var(--muted); }
  .avisos-pendientes {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--muted);
  }
  .badge-count {
    background: var(--amber); color: #000;
    font-size: 12px; font-weight: 800;
    padding: 2px 8px; border-radius: 12px;
  }
  .badge-count.urgente { background: var(--red); color: #fff; }

  /* ── LISTA DE AVISOS ── */
  .lista {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .aviso-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  /* Barra lateral izquierda según estado */
  .aviso-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--border);
    border-radius: 10px 0 0 10px;
  }
  .aviso-card.urgente::before { background: var(--red); }
  .aviso-card.ahora::before  { background: var(--green); }
  .aviso-card.proximo::before { background: var(--amber); }

  /* Flash para urgente */
  .aviso-card.urgente {
    border-color: var(--red);
    animation: flashBorder 2s infinite;
  }
  @keyframes flashBorder {
    0%,100% { box-shadow: 0 0 0 0 rgba(232,0,45,0); }
    50%      { box-shadow: 0 0 0 4px rgba(232,0,45,0.25); }
  }

  /* Resaltado si es el horario actual */
  .aviso-card.ahora {
    border-color: var(--green);
    background: #0a1f0a;
  }

  .aviso-icono { font-size: 22px; flex-shrink: 0; margin-top: 2px; }

  .aviso-cuerpo { flex: 1; min-width: 0; }

  .aviso-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    flex-wrap: wrap;
  }

  .aviso-marca { font-size: 15px; font-weight: 700; }

  .tag {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    padding: 2px 7px; border-radius: 4px;
    text-transform: uppercase;
  }
  .tag-programa { background: #1a1a3a; color: var(--blue); border: 1px solid #2a2a5a; }
  .tag-ahora    { background: #0a2a0a; color: var(--green); border: 1px solid #1a4a1a; }
  .tag-urgente  { background: #2a0a0a; color: var(--red); border: 1px solid #4a1a1a; }
  .tag-bloque   { background: #3a1a00; color: var(--amber); border: 1px solid #5a2a00; }
  .tag-frecuencia { background: #1a3a1a; color: var(--green); border: 1px solid #2a5a2a; }

  .aviso-horario {
    font-size: 13px; font-weight: 700; color: var(--amber);
    display: flex; align-items: center; gap: 4px;
  }

  .aviso-texto {
    font-size: 14px;
    line-height: 1.6;
    color: #ddd;
    margin-top: 4px;
  }

  .aviso-meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* ── ESTADOS VACÍOS / CARGA ── */
  .estado-vacio {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    gap: 10px;
    padding: 60px 20px;
    text-align: center;
  }
  .estado-vacio span { font-size: 42px; }
  .estado-vacio p { font-size: 13px; line-height: 1.6; max-width: 280px; }

  /* ── FOOTER ── */
  .footer {
    height: 36px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 8px;
    flex-shrink: 0;
  }
  .footer-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  .footer-dot.sin-conexion { background: var(--muted); }
  .footer-text { font-size: 11px; color: var(--muted); }
  .footer-update { margin-left: auto; font-size: 11px; color: var(--muted); }

  /* Scrollbar */
  .lista::-webkit-scrollbar { width: 4px; }
  .lista::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="station">RADIO <span>MILA</span> FM 88.7</div>
  <div class="on-air"><div class="dot"></div>AL AIRE</div>
  <div style="display:flex;align-items:flex-end;gap:6px;margin-left:auto">
    <div class="clock" id="reloj">00:00:00</div>
    <div class="fecha" id="fecha"></div>
  </div>
</div>

<!-- PROGRAMA ACTUAL -->
<div class="programa-bar">
  <span class="programa-label">Programa actual</span>
  <span class="programa-nombre" id="programaNombre">—</span>
  <span class="programa-horario" id="programaHorario"></span>
  <div class="avisos-pendientes">
    <span id="contadorLabel" style="font-size:12px;color:var(--muted)">Menciones:</span>
    <span class="badge-count" id="contadorBadge">0</span>
  </div>
</div>

<!-- LISTA DE AVISOS -->
<div class="lista" id="listaAvisos">
  <div class="estado-vacio">
    <span>⏳</span>
    <p>Cargando avisos...</p>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-dot" id="footerDot"></div>
  <span class="footer-text" id="footerText">Conectando...</span>
  <span class="footer-update" id="footerUpdate"></span>
</div>

<script>
// ============================================================
// RADIO MILA FM 88.7 - PANEL ESTUDIO
// ============================================================

// ✅ URL CORREGIDA - Usa la URL de tu Apps Script actual
const API = 'https://script.google.com/macros/s/AKfycbzDEDFLIl94LxJa74BfGZ2aceVtDq1ui_D5gm4K9UUBJOeX4BKlhoPSoYgi23-cyU6v/exec';

let PROGRAMAS = [];
let avisos = [];

// ── RELOJ ──────────────────────────────────────────────────
function actualizarReloj() {
  const ahora = new Date();
  const h = String(ahora.getHours()).padStart(2,'0');
  const m = String(ahora.getMinutes()).padStart(2,'0');
  const s = String(ahora.getSeconds()).padStart(2,'0');
  document.getElementById('reloj').textContent = `${h}:${m}:${s}`;

  const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  document.getElementById('fecha').innerHTML =
    `${dias[ahora.getDay()]}<br>${ahora.getDate()} ${meses[ahora.getMonth()]} ${ahora.getFullYear()}`;

  actualizarProgramaActual();
  actualizarEstadoAvisos();
}
setInterval(actualizarReloj, 1000);
actualizarReloj();

// ── PROGRAMA ACTUAL ─────────────────────────────────────────
function horaEnMinutos(str) {
  if (!str) return null;
  const [h, m] = str.split(':').map(Number);
  if (isNaN(h) || isNaN(m)) return null;
  return h * 60 + m;
}

function getProgramaActual() {
  const ahora = new Date();
  const minutos = ahora.getHours() * 60 + ahora.getMinutes();
  return PROGRAMAS.find(p => {
    const ini = horaEnMinutos(p.inicio);
    let fin = horaEnMinutos(p.fin);
    if (fin === null || ini === null) return false;
    if (fin === 0) fin = 24 * 60;
    return minutos >= ini && minutos < fin;
  }) || null;
}

function actualizarProgramaActual() {
  const prog = getProgramaActual();
  const el = document.getElementById('programaNombre');
  const hor = document.getElementById('programaHorario');
  if (prog) {
    el.textContent = prog.nombre;
    hor.textContent = `${prog.inicio} – ${prog.fin}`;
  } else {
    el.textContent = 'Sin programa activo';
    hor.textContent = '';
  }
}

// ── FUNCIONES DE HORARIO ────────────────────────────────────
// ✅ CORREGIDO: Usa el campo 'hora' en vez de 'horario'
function esHorarioActivo(horaStr) {
  if (!horaStr) return false;
  // Formato esperado: "10:30" (hora simple)
  const min = horaEnMinutos(horaStr);
  if (min === null) return false;
  const ahora = new Date();
  const minActual = ahora.getHours() * 60 + ahora.getMinutes();
  // Considera activo si estamos en la misma hora (±5 min)
  return Math.abs(minActual - min) <= 5;
}

function esProximo(horaStr) {
  if (!horaStr) return false;
  const min = horaEnMinutos(horaStr);
  if (min === null) return false;
  const ahora = new Date();
  const minActual = ahora.getHours() * 60 + ahora.getMinutes();
  return min > minActual && min - minActual <= 30;
}

// ── RENDERIZAR AVISOS ───────────────────────────────────────
function actualizarEstadoAvisos() {
  document.querySelectorAll('.aviso-card[data-id]').forEach(card => {
    const id = card.dataset.id;
    const aviso = avisos.find(a => String(a.id) === id);
    if (!aviso) return;
    const activo = esHorarioActivo(aviso.hora);
    const prox = esProximo(aviso.hora);
    card.classList.toggle('ahora', activo && !esUrgente(aviso));
    card.classList.toggle('proximo', prox && !activo && !esUrgente(aviso));
    
    const tagAhora = card.querySelector('.tag-ahora');
    if (activo && !tagAhora && !esUrgente(aviso)) {
      const tag = document.createElement('span');
      tag.className = 'tag tag-ahora'; 
      tag.textContent = '📍 AHORA';
      card.querySelector('.aviso-top').insertBefore(tag, card.querySelector('.aviso-horario'));
    } else if (!activo && tagAhora) {
      tagAhora.remove();
    }
  });

  const programa = getProgramaActual();
  const programaNombre = programa ? programa.nombre : null;
  const avisosPrograma = programaNombre
    ? avisos.filter(a => a.programa === programaNombre)
    : avisos;

  const urgentes = avisos.filter(a => esUrgente(a)).length;
  const badge = document.getElementById('contadorBadge');
  badge.textContent = avisosPrograma.length;
  badge.className = 'badge-count' + (urgentes > 0 ? ' urgente' : '');
}

// ✅ CORREGIDO: Maneja urgente como booleano o string
function esUrgente(aviso) {
  return aviso.urgente === true || aviso.urgente === 'true' || aviso.urgente === 1;
}

// ✅ CORREGIDO: Genera el texto de horario según el tipo de aviso
function getHorarioTexto(aviso) {
  if (aviso.hora) return aviso.hora;
  if (aviso.bloque) return aviso.bloque;
  if (aviso.frecuencia) return aviso.frecuencia;
  return '—';
}

// ✅ CORREGIDO: Genera el tag según el tipo
function getTipoTag(aviso) {
  const tipoMap = {
    'horario_fijo': '⏰ HORARIO FIJO',
    'bloque': '📦 BLOQUE',
    'mencion': '🔁 FRECUENCIA'
  };
  return tipoMap[aviso.tipo] || aviso.tipo;
}

function renderAvisos() {
  const lista = document.getElementById('listaAvisos');

  if (avisos.length === 0) {
    lista.innerHTML = `
      <div class="estado-vacio">
        <span>📭</span>
        <p>Sin avisos programados.<br>Patricia puede agregar desde Telegram.</p>
      </div>`;
    return;
  }

  const programa = getProgramaActual();
  const programaNombre = programa ? programa.nombre : null;

  // Separar: urgentes primero, luego del programa actual, luego el resto
  const urgentes  = avisos.filter(a => esUrgente(a));
  const delProg   = avisos.filter(a => !esUrgente(a) && a.programa === programaNombre);
  const otros     = avisos.filter(a => !esUrgente(a) && a.programa !== programaNombre);
  const ordenados = [...urgentes, ...delProg, ...otros];

  lista.innerHTML = '';

  // Sección: programa actual
  if (programaNombre && delProg.length > 0) {
    const sep = document.createElement('div');
    sep.style.cssText = 'font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:4px 0 8px 0;';
    sep.textContent = `📻 ${programaNombre}`;
    lista.appendChild(sep);
  }

  ordenados.forEach(a => {
    const activo = esHorarioActivo(a.hora);
    const prox   = esProximo(a.hora);
    const urgente = esUrgente(a);

    const card = document.createElement('div');
    card.dataset.id = String(a.id);
    card.className = 'aviso-card' +
      (urgente ? ' urgente' : '') +
      (activo && !urgente ? ' ahora' : '') +
      (prox && !activo && !urgente ? ' proximo' : '');

    const icono = urgente ? '🔴' : activo ? '📍' : '📢';

    card.innerHTML = `
      <div class="aviso-icono">${icono}</div>
      <div class="aviso-cuerpo">
        <div class="aviso-top">
          <span class="aviso-marca">${a.marca || 'Sin marca'}</span>
          <span class="tag tag-programa">${a.programa || '—'}</span>
          ${urgente ? '<span class="tag tag-urgente">⚡ URGENTE</span>' : ''}
          ${activo && !urgente ? '<span class="tag tag-ahora">📍 AHORA</span>' : ''}
          <span class="aviso-horario">⏰ ${getHorarioTexto(a)}</span>
        </div>
        <div class="aviso-texto">${a.copy || 'Sin texto'}</div>
        <div class="aviso-meta">
          <span class="tag tag-${a.tipo === 'bloque' ? 'bloque' : a.tipo === 'mencion' ? 'frecuencia' : 'programa'}">${getTipoTag(a)}</span>
          ${a.bloque ? `<span>📦 ${a.bloque}</span>` : ''}
          ${a.frecuencia ? `<span>🔁 ${a.frecuencia}</span>` : ''}
        </div>
      </div>`;

    lista.appendChild(card);

    // Separador antes de "otros"
    if (a === delProg[delProg.length - 1] && otros.length > 0) {
      const sep2 = document.createElement('div');
      sep2.style.cssText = 'font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:8px 0 4px 0;';
      sep2.textContent = 'Otros programas';
      lista.appendChild(sep2);
    }
  });

  actualizarEstadoAvisos();
}

// ── CARGAR AVISOS DESDE APPS SCRIPT ─────────────────────────
async function cargarAvisos() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    
    // ✅ Soporte para respuesta con {avisos, programas, radio}
    if (Array.isArray(data)) {
      avisos = data;
    } else {
      avisos = data.avisos || [];
      if (data.programas && data.programas.length > 0) {
        PROGRAMAS = data.programas;
      }
    }
    
    renderAvisos();
    
    // Mostrar estado
    document.getElementById('footerDot').className = 'footer-dot';
    document.getElementById('footerText').textContent = 'En línea · Radio Mila FM 88.7';
    document.getElementById('footerUpdate').textContent =
      'Actualizado: ' + new Date().toLocaleTimeString('es-CL');
  } catch (e) {
    document.getElementById('footerDot').className = 'footer-dot sin-conexion';
    document.getElementById('footerText').textContent = 'Sin conexión · ' + e.message;
    console.error('Error cargando avisos:', e);
    
    // Mostrar error en la lista
    document.getElementById('listaAvisos').innerHTML = `
      <div class="estado-vacio">
        <span>⚠️</span>
        <p>Error de conexión<br>${e.message}<br><br>Verifica que la URL de la API sea correcta.</p>
      </div>`;
  }
}

// Cargar al inicio y cada 30 segundos
cargarAvisos();
setInterval(cargarAvisos, 30000);
</script>
</body>
</html>
